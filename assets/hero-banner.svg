<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="200" rx="10" fill="#0D1117"/>
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bc8cff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background pattern (Nodes and Connections) -->
  <circle cx="100" cy="60" r="3" fill="#30363D" />
  <circle cx="200" cy="140" r="4" fill="#30363D" />
  <circle cx="400" cy="100" r="5" fill="#30363D" />
  <circle cx="600" cy="40" r="3" fill="#30363D" />
  <circle cx="700" cy="150" r="4" fill="#30363D" />
  
  <line x1="100" y1="60" x2="200" y2="140" stroke="#30363D" stroke-width="1" />
  <line x1="200" y1="140" x2="400" y2="100" stroke="#30363D" stroke-width="1" />
  <line x1="400" y1="100" x2="600" y2="40" stroke="#30363D" stroke-width="1" />
  <line x1="600" y1="40" x2="700" y2="150" stroke="#30363D" stroke-width="1" />

  <!-- Text -->
  <text x="50%" y="45%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="url(#grad1)">
    Awesome Chain-of-Thought
  </text>
  <text x="50%" y="65%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#8B949E">
    A Curated List of LLMs with Advanced Reasoning Capabilities
  </text>
  
  <!-- "Thought" Icon -->
  <path d="M400 140 Q410 160 430 160 Q450 160 450 140 Q450 120 430 120 Q410 120 400 140" stroke="url(#grad1)" stroke-width="2" fill="none" opacity="0.6"/>
</svg>
